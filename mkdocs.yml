site_name: Vega
site_url: https://vega-agent.github.io/vega
repo_url: https://github.com/vega-agent/vega
repo_name: vega-agent/vega
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Context Tree: context-tree.md
  - Privacy: privacy.md
  - Workflows: workflows.md
  - Contributing: contributing.md